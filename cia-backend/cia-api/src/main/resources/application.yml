spring:
  application:
    name: cia-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/cia}
    username: ${DB_USERNAME:cia}
    password: ${DB_PASSWORD:cia_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Set the per-connection PostgreSQL session var that pgcrypto reads via
      # current_setting('app.pii_key'). Required for the @ColumnTransformer
      # encryption on Customer / CustomerDirector PII fields. Must run on every
      # new connection — Hikari runs this once after acquiring a connection
      # from the pool.
      connection-init-sql: "SET app.pii_key = '${cia.security.pii-key}'"

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8280}/realms/${KEYCLOAK_REALM:cia}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

server:
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

cia:
  temporal:
    host: ${TEMPORAL_HOST:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}

  storage:
    type: ${STORAGE_TYPE:minio}
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    bucket-name: ${STORAGE_BUCKET:cia-documents}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    region: ${STORAGE_REGION:us-east-1}

  naicom:
    mode: ${NAICOM_MODE:stub}
    api-url: ${NAICOM_API_URL:}

  niid:
    mode: ${NIID_MODE:stub}
    api-url: ${NIID_API_URL:}

  kyc:
    provider: ${KYC_PROVIDER:mock}
    provider-url: ${KYC_PROVIDER_URL:}

  notifications:
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
    sms:
      enabled: ${SMS_NOTIFICATIONS_ENABLED:true}

  partner:
    oauth2:
      token-url: ${PARTNER_TOKEN_URL:http://localhost:8280/realms/cia/protocol/openid-connect/token}
    webhook:
      signing-secret: ${WEBHOOK_SIGNING_SECRET:dev-secret-replace-in-prod}

  security:
    # NDPR PII encryption key for pgcrypto (pgp_sym_encrypt / pgp_sym_decrypt).
    # Used via current_setting('app.pii_key') on the Hibernate connection.
    # MUST be set to a strong, externally managed value in production —
    # losing this key means all encrypted customer PII is unrecoverable.
    # Recommended: 32+ random bytes, base64-encoded.
    pii-key: ${PII_ENCRYPTION_KEY:dev-pii-key-do-not-use-in-prod-CHANGE-ME}

springdoc:
  api-docs:
    path: /partner/v3/api-docs
  swagger-ui:
    path: /partner/docs
  default-produces-media-type: application/json

bucket4j:
  enabled: true
  cache-to-use: redis-jedis
  filters:
    - cache-name: rate-limit-partner
      url: /partner/v1/.*
      filter-method: SERVLET
      rate-limits:
        - bandwidths:
            - capacity: 1000
              time: 1
              unit: minutes
              refill-speed: interval

logging:
  level:
    com.nubeero.cia: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
