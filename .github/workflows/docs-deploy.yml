name: Deploy Docs to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'cia-backend/cia-partner-api/docs/openapi.json'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Sync latest OpenAPI spec into static/
        run: cp cia-backend/cia-partner-api/docs/openapi.json docs-site/static/openapi.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: docs-site
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: docs-site
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: docs-site
        run: vercel deploy --prebuilt --prod --force --token=${{ secrets.VERCEL_TOKEN }}
