name: Deploy Docs to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'cia-backend/cia-partner-api/docs/openapi.json'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      # cia-docs project ID — hardcoded to prevent the shared VERCEL_PROJECT_ID
      # secret (which points to back-office) from overriding this workflow
      VERCEL_PROJECT_ID: prj_KgaDZ7fSkBNu3r6GEdiV8vAoZyAC

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Sync latest OpenAPI spec into static/
        run: cp cia-backend/cia-partner-api/docs/openapi.json docs-site/static/openapi.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --force --token="$VERCEL_TOKEN"
