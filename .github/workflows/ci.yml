name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: JUnit 5 + Testcontainers (real PostgreSQL via Docker) ──────────
  backend:
    name: Backend (Java 21 · Maven · Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: cia-backend/pom.xml

      - name: Build and verify (JUnit 5 + Testcontainers)
        working-directory: cia-backend
        run: ./mvnw verify --batch-mode --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: cia-backend/**/target/surefire-reports/

  # ── Frontend: pnpm · TypeScript · build ────────────────────────────────────
  frontend:
    name: Frontend (Node 20 · pnpm · TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('cia-frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: cia-frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check — back-office
        working-directory: cia-frontend
        run: pnpm --filter @cia/back-office typecheck

      - name: TypeScript check — partner
        working-directory: cia-frontend
        run: pnpm --filter @cia/partner typecheck

      - name: Build — back-office
        working-directory: cia-frontend
        run: pnpm --filter @cia/back-office build
        env:
          VITE_API_BASE_URL: https://api.nubsure.app
          VITE_KEYCLOAK_URL: https://auth.nubsure.app
          VITE_KEYCLOAK_REALM: nubsure
          VITE_KEYCLOAK_CLIENT_ID: back-office

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: back-office-dist
          path: cia-frontend/apps/back-office/dist/
          retention-days: 3

  # ── Docs: Build Docusaurus (validates no broken links / MDX errors) ─────────
  # Stubbed until docs-site/ is scaffolded. Remove the `if: false` when ready.
  docs:
    name: Docs (Docusaurus build)
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus
        working-directory: docs-site
        run: npm run build
