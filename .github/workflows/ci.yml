name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: JUnit 5 + Testcontainers (real PostgreSQL via Docker) ──────────
  backend:
    name: Backend (Java 21 · Maven · Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: cia-backend/pom.xml

      - name: Build and verify (JUnit 5 + Testcontainers)
        working-directory: cia-backend
        run: ./mvnw verify --batch-mode --no-transfer-progress
        env:
          # Testcontainers uses the Docker socket available on ubuntu-latest runners
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: cia-backend/**/target/surefire-reports/

  # ── Frontend: Vitest (unit) + Playwright (E2E) ─────────────────────────────
  # Stubbed until cia-frontend/ is created. Remove the `if: false` when ready.
  frontend:
    name: Frontend (Vitest · Playwright)
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cia-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cia-frontend
        run: npm ci

      - name: Run Vitest (unit + component)
        working-directory: cia-frontend
        run: npm run test:unit -- --reporter=verbose

      - name: Install Playwright browsers
        working-directory: cia-frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: cia-frontend
        run: npm run test:e2e
        env:
          VITE_API_BASE_URL: http://localhost:8090
          VITE_KEYCLOAK_URL: http://localhost:8180

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: cia-frontend/playwright-report/

  # ── Docs: Build Docusaurus (validates no broken links / MDX errors) ─────────
  # Stubbed until docs-site/ is scaffolded. Remove the `if: false` when ready.
  docs:
    name: Docs (Docusaurus build)
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus
        working-directory: docs-site
        run: npm run build
